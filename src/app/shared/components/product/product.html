<div class="flex flex-col w-[300px] cursor-pointer transition-transform hover:scale-[1.02]" (click)="addToCart()">
    <img class="h-[300px] w-[300px] mb-4 object-cover rounded-xl bg-[#F0EEED]" [src]="product()?.imageUrl" alt="{{ product()?.name }}" />
    <h3 class="text-[16px] font-bold mb-2">{{ product()?.name }}</h3>
    <p class="text-[14px] opacity-60 mb-2">{{ product()?.description }}</p>
    <p class="text-[16px] font-bold">{{ product()?.price | currency }}</p>
</div>
