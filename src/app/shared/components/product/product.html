<div class="flex flex-col width-[300px]">
    <img class="h-[300px] w-[300px] mb-4" [src]="product()?.imageUrl" alt="{{ product()?.name }}" />
    <h3 class="text-[16px] font-bold mb-2">{{ product()?.name }}</h3>
    <p class="text-[14px] opacity-60 mb-2">{{ product()?.description }}</p>
    <p class="text-[16px] font-bold">{{ product()?.price }}</p>
</div>
